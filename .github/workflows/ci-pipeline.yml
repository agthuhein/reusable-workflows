name: my-workflow-file
# Reusable workflows to be called from other workflows
on:
  workflow_call:
    inputs:
      run_unit_tests:
        description: "Run Unit Tests"
        required: false
        default: true
        type: boolean
      run_build:
        description: "Create application image"
        required: false
        default: true
        type: boolean
      run_codeql:
        description: "Run CodeQL Scan"
        required: false
        default: false
        type: boolean
      run_sonarqube:
        description: "Run SonarQube Scan"
        required: false
        default: false
        type: boolean
      run_dockerhub_publish:
        description: "Publish Docker Image to DockerHub"
        required: false
        default: false
        type: boolean
      run_ghcr_publish:
        description: "Publish Docker Image to GHCR"
        required: false
        default: false
        type: boolean   
    secrets:
      SONAR_TOKEN:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  unit-tests:
    if: ${{ inputs.run_unit_tests }}
    name: Running unit tests
    runs-on: ubuntu-latest
    steps:
      #download the code
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      #do the set up
      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.10'
      # install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirement.txt

      - name: Run Unit Test
        run: |
          mkdir reports/
          pytest --junitxml=reports/unit-test-results.xml --cov=. --cov-report=xml:reports/coverage.xml --cov-report=term-missing -v
      - name: Upload code coverage report
        uses: actions/upload-artifact@v5.0.0
        with:
          name: unit-test-report
          path: reports/
  codeql:
    if: ${{ inputs.run_codeql }}
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write # require to upload the analysis results
    strategy:
      matrix:
        language: ['python']
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: 'security'
  sonarqube:
    if: ${{ inputs.run_sonarqube }}
    name: SonarQube
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - name: Download coverage report
        uses: actions/download-artifact@v5.0.0
        with:
          name: unit-test-report
          path: reports/
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  build:
    if: ${{ success() && inputs.run_build }}
    name: Build image
    runs-on: ubuntu-latest
    needs: [unit-tests, sonarqube, codeql]
    outputs:
      image_tags: ${{ steps.vars.outputs.IMAGE_TAGS }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0
      - name: Setup docker buildx
        uses: docker/setup-buildx-action@v3.0.0
      - name: Generate Image tags
        id: vars
        run: |
          IMAGE_TAGS="${{ github.run_id}}-${GITHUB_SHA::7}"
          echo "IMAGE_TAGS=$IMAGE_TAGS" >> $GITHUB_OUTPUT
      - name: Build image (no push)
        uses: docker/build-push-action@v5.0.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ath_app:${{ steps.vars.outputs.IMAGE_TAGS }}
          load: true
      - name: Save docker image
        run: docker save ath_app:${{ steps.vars.outputs.IMAGE_TAGS }} -o ath_app.tar
      - name: Upload docker image artifact
        uses: actions/upload-artifact@v5.0.0
        with:
          name: ath_app_image
          path: ath_app.tar
  publish-dockerhub:
    if: ${{ inputs.run_dockerhub_publish }}
    name: Publish to docker hub
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download the image
        uses: actions/download-artifact@v5.0.0
        with:
          name: ath_app_image
          path: .
      - name: Load Docker Image
        run: docker load -i ath_app.tar
      - name: Docker Login
        uses: docker/login-action@v3 # docker login -u DOCKERHUB_USER -p DOCKER_PASSWORD
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME}}
          password: ${{ secrets.DOCKERHUB_TOKEN}}
      - name: Tag Image
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image_tags }}"
          docker image tag ath_app:$IMAGE_TAG ${{ secrets.DOCKERHUB_USERNAME}}/ath_app:$IMAGE_TAG
      - name: Push Image
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image_tags }}"
          docker image push ${{ secrets.DOCKERHUB_USERNAME}}/ath_app:$IMAGE_TAG
  publish-ghcr:
    if: ${{ inputs.run_ghcr_publish }}
    name: Publish to git hub container registry
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write
      contents: read
    steps:
      - name: Download the image
        uses: actions/download-artifact@v5.0.0
        with:
          name: ath_app_image
          path: .
      - name: Load Docker Image
        run: docker load -i ath_app.tar
      - name: Login to GHCR
        uses: docker/login-action@v3 # docker login -u DOCKERHUB_USER -p DOCKER_PASSWORD
        with:
          registry: ghcr.io
          username: ${{ github.actor}}
          password: ${{ secrets.GITHUB_TOKEN}} #GitHub automatically creates a GITHUB_TOKEN secret to use in your workflows. Pus to GHCR, create release,
      - name: Tag Image
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image_tags }}"
          docker image tag ath_app:$IMAGE_TAG ghcr.io/${{ github.repository_owner}}/ath_app:$IMAGE_TAG
      - name: Push Image
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image_tags }}"
          docker image push ghcr.io/${{ github.repository_owner}}/ath_app:$IMAGE_TAG
